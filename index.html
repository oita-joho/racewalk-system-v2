<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競歩システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="card">
    <h1 id="title">競歩システム</h1>
    <p id="subtitle">mode=judge / recorder / chief / board / host</p>
  </header>

  <main>
    <section class="card">
      <h2>接続</h2>
      <label>サーバURL</label>
      <input id="serverUrl" type="text" placeholder="例: ws://localhost:3000 または https://xxxxx.onrender.com">

      <label>PIN</label>
      <input id="pin" type="password" placeholder="PINを入力">

      <button id="connectBtn">接続</button>
      <div id="status">未接続</div>
    </section>

    <section id="judgeArea" class="card hidden">
      <h2>審判入力</h2>

      <label>ナンバー</label>
      <input id="bib" type="text" placeholder="例: 101">

      <label>判定</label>
      <select id="action">
        <option value="warning">警告</option>
        <option value="red">赤カード</option>
      </select>

      <button id="sendBtn">送信</button>
    </section>

    <section id="hostArea" class="card hidden">
      <h2>設定</h2>

      <label>新しい審判PIN</label>
      <input id="newJudgePin" type="text" placeholder="4桁など">

      <button id="saveJudgePinBtn">審判PIN保存</button>
      <button id="resetBtn" class="danger">記録を全消去</button>
    </section>

    <section class="card">
      <h2>記録一覧</h2>
      <div id="summary"></div>
      <div id="list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競歩システム QR</title>
<style>
body{
font-family:sans-serif;
text-align:center;
background:#f5f5f5;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

img{
width:200px;
}
</style>
</head>

<body>

<h1>競歩システム QRコード</h1>

<div class="container">

<div class="card">
<h2>審判</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://oita-joho.github.io/racewalk-system/judge.html?pin=1111&server=https://racewalk-system.onrender.com">
</div>

<div class="card">
<h2>記録員</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://oita-joho.github.io/racewalk-system/?mode=recorder&pin=2222&server=https://racewalk-system.onrender.com">
</div>

<div class="card">
<h2>主任</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://oita-joho.github.io/racewalk-system/?mode=chief&pin=3333&server=https://racewalk-system.onrender.com">
</div>

<div class="card">
<h2>掲示板</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://oita-joho.github.io/racewalk-system/?mode=board&pin=4444&server=https://racewalk-system.onrender.com">
</div>

<div class="card">
<h2>設定</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://oita-joho.github.io/racewalk-system/?mode=host&pin=9999&server=https://racewalk-system.onrender.com">
</div>

</div>

</body>
</html>
